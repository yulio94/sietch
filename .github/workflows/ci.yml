name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 system dependencies (webkit, gtk, appindicator)
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Frontend lint + build (dist/ must exist before any cargo step,
      # since tauri-build embeds frontendDist at compile time)
      - name: Biome check
        run: pnpm check
      - name: Build frontend
        run: pnpm build

      # Rust lint + build
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: Build Rust
        run: cargo build --manifest-path src-tauri/Cargo.toml --release
